services:
  db:
    image: mysql:8.0
    container_name: jokes-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: jokesdb
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db-init/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-padmin123"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: jokes-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  joke-service:
    build: ./joke-service
    container_name: joke-service
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: db
      DB_USER: root
      DB_PASS: admin123
      DB_NAME: jokesdb
    ports:
      - "3000:3000"

  submit-service:
    build: ./submit-service
    container_name: submit-service
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      joke-service:
        condition: service_started
    environment:
      PORT: 3001
      DB_HOST: db
      DB_USER: root
      DB_PASS: admin123
      DB_NAME: jokesdb
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      QUEUE_NAME: submit_jokes
      JOKE_SERVICE_URL: http://joke-service:3000
      TYPES_CACHE_FILE: /app/cache/types.json
    ports:
      - "3001:3001"
    volumes:
      - submit_cache:/app/cache

  etl-service:
    build: ./etl-service
    container_name: etl-service
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    environment:
      PORT: 3002
      DB_HOST: db
      DB_USER: root
      DB_PASS: admin123
      DB_NAME: jokesdb
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      QUEUE_NAME: submit_jokes
    ports:
      - "3002:3002"

volumes:
  db_data:
  submit_cache:
  rabbitmq_data: