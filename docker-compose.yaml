services:
  db:
    image: mysql:8.0
    container_name: jokes-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: jokesdb
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db-init/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  joke-service:
    build: ./joke-service
    container_name: joke-service
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: db
      DB_USER: root
      DB_PASS: rootpasswordt
      DB_NAME: jokesdb
    ports:
      - "3000:3000"

  submit-service:
    build: ./submit-service
    container_name: submit-service
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3001
      DB_HOST: db
      DB_USER: root
      DB_PASS: rootpassword
      DB_NAME: jokesdb
    ports:
      - "3001:3001"

volumes:
  db_data: