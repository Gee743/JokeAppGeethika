_format_version: "3.0"

services:
  - name: joke-service
    url: http://joke-service:3000
    routes:
      - name: joke-routes
        paths:
          - /joke
          - /types
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 5
          policy: local

  - name: submit-service
    url: http://submit-service:3001
    routes:
      - name: submit-routes
        paths:
          - /submit
          - /docs
        strip_path: false

  - name: moderate-service
    url: http://moderate-service:3003
    routes:
      - name: moderate-routes
        paths:
          - /moderate
          - /moderated
        strip_path: false