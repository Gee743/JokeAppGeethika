<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Jokes App</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; }
      .card { padding: 16px; border: 1px solid #ddd; border-radius: 10px; }
      .row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
      #punchline { margin-top: 12px; font-weight: bold; }
      button { padding: 8px 12px; }
      select, button { font-size: 14px; }
    </style>
  </head>
  <body>
    <h1>Jokes</h1>

    <div class="row">
      <label for="typeSelect">Type:</label>
      <select id="typeSelect"></select>
      <button id="newJokeBtn">New joke</button>
    </div>

    <div class="card">
      <div id="setup">Click “New joke”</div>
      <div id="punchline"></div>
    </div>

    <script>
      const typeSelect = document.getElementById("typeSelect");
      const setupEl = document.getElementById("setup");
      const punchlineEl = document.getElementById("punchline");
      const newJokeBtn = document.getElementById("newJokeBtn");

      let punchlineTimer = null;

      async function loadTypes() {
        const res = await fetch("/types");
        const types = await res.json();

        // Always include "any"
        const all = ["any", ...types];

        typeSelect.innerHTML = "";
        for (const t of all) {
          const opt = document.createElement("option");
          opt.value = t;
          opt.textContent = t;
          typeSelect.appendChild(opt);
        }
      }

      async function getJoke() {
        if (punchlineTimer) clearTimeout(punchlineTimer);
        punchlineEl.textContent = "";

        const type = typeSelect.value || "any";
        const res = await fetch(`/joke/${encodeURIComponent(type)}`);
        if (!res.ok) {
          setupEl.textContent = "No joke found.";
          return;
        }
        const joke = await res.json();
        setupEl.textContent = joke.setup;

        punchlineTimer = setTimeout(() => {
          punchlineEl.textContent = joke.punchline;
        }, 3000);
      }

      // Assignment hint: call /types when dropdown is interacted with
      typeSelect.addEventListener("mousedown", loadTypes);
      typeSelect.addEventListener("focus", loadTypes);

      newJokeBtn.addEventListener("click", getJoke);

      // Initial load
      loadTypes().catch(console.error);
    </script>
  </body>
</html>
